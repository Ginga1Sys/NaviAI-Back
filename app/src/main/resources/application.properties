# Use in-memory H2 database for local/container test runs
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# data.sql を Hibernate DDL 実行後に実行する（Spring Boot 2.5+ のデフォルト動作を上書き）
# これにより like/comment テーブルが knowledge テーブル作成後に生成される
spring.jpa.defer-datasource-initialization=true

# Reduce logging noise
logging.level.org.springframework=WARN

# Enable H2 console (accessible if port forwarded)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Token configuration
token.secret=your-secret-key-change-in-production-minimum-32-characters-required
token.access.expiration=3600
token.refresh.expiration=2592000

# Mail configuration
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend base URL (used for redirect after email confirmation)
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
